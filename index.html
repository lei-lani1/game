<!DOCTYPE html>
<html lang="zh-CN">
<head>

        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .category-selection,
        .game-area {
            display: none;
        }

        .category-selection.active,
        .game-area.active {
            display: block;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .info-value {
            color: #667eea;
            font-size: 1.5em;
            font-weight: bold;
        }

        .hint-counter {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #d35400;
            padding: 8px 15px;
            border-radius: 15px;
            font-weight: bold;
            margin-bottom: 20px;
            display: inline-block;
            font-size: 0.9em;
        }

        .hint-warning {
            color: #e74c3c;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .level-badge {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
        }

        .level-complete {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        .level-complete h2 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .level-complete p {
            color: #666;
            margin-bottom: 20px;
        }

        .stars {
            font-size: 2em;
            margin: 15px 0;
        }

        .question-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .answer-section {
            margin-bottom: 30px;
        }

        .answer-input {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .answer-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 20px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            flex: 1;
            min-width: 100px;
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-show {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-show:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .btn-next {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(79, 172, 254, 0.4);
        }

        .result-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
        }

        .result-correct {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .result-wrong {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .answer-reveal {
            margin-top: 15px;
            padding: 15px;
            background: #fff3cd;
            border: 2px solid #ffeaa7;
            border-radius: 10px;
            color: #856404;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .celebrate {
            animation: celebrate 0.5s ease-in-out;
        }

        .emoji {
            font-size: 2em;
            margin: 10px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .category-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
            text-align: center;
        }

        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .category-card.puzzle {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .category-card.funny {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .category-card.word {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .category-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .category-name {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .category-desc {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .category-count {
            font-size: 0.8em;
            margin-top: 10px;
            opacity: 0.8;
        }

        .back-button {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #d35400;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .back-button:hover {
            transform: translateY(-2px);

        }

            }

            .level-badge {
                font-size: 0.9em;
                padding: 6px 15px;
            }

            .hint-counter {
                font-size: 0.8em;
                padding: 6px 12px;
            }

            .result-message,
            .answer-reveal {
                font-size: 0.9em;
                padding: 12px;
            }

                margin: 5px;

            }

            }

                font-size: 0.85em;
                min-width: 70px;
                max-width: 100px;
            }

            .button-container {
                gap: 4px;
            }
        }
    </style>
</head>

        <div class="game-area" id="gameArea">

                </div>
            </div>

            <div class="result-message" id="resultMessage"></div>
            <div class="answer-reveal" id="answerReveal"></div>
        </div>

        case 'funny':
            currentRiddles = [...funnyRiddles, ...defaultRiddles];
            document.getElementById('categoryIndicator').textContent = '搞笑类';
            document.getElementById('gameSubtitle').textContent = '搞笑类 - 轻松幽默，快乐答题';
            break;
        case 'word':
            currentRiddles = [...wordRiddles];  // 改这里
            document.getElementById('categoryIndicator').textContent = '文字类';
            document.getElementById('gameSubtitle').textContent = '文字类 - 文字游戏，巧妙解谜';
            break;
    }
    
    // 切换到游戏页面
    document.getElementById('categorySelection').classList.remove('active');
    document.getElementById('gameArea').classList.add('active');
    
    // 初始化游戏
    initGame();
}

        // 返回分类选择
        function backToCategories() {
            document.getElementById('gameArea').classList.remove('active');
            document.getElementById('categorySelection').classList.add('active');
            
            // 重置游戏状态
            currentLevel = 1;
            currentQuestionIndex = 0;
            correctCount = 0;
            usedRiddles = [];
            hintCount = 3;
            currentCategory = '';
            currentRiddles = [];
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function initGame() {
            currentLevel = 1;
            currentQuestionIndex = 0;
            correctCount = 0;
            usedRiddles = [];
            startLevel();
        }

        function startLevel() {
            const questionsInLevel = currentLevel * 10;
           const availableRiddles = currentRiddles.filter(riddle => !usedRiddles.includes(riddle));
            if (availableRiddles.length < questionsInLevel) {
                alert('题目已用完！游戏结束！');
                return;
            }
            
            levelRiddles = shuffleArray(availableRiddles).slice(0, questionsInLevel);
            currentQuestionIndex = 0;
            correctCount = 0;
            hintCount = 3;
            
            updateDisplay();
            showQuestion();
        }

        function showQuestion() {
            const questionBox = document.getElementById('questionBox');
            questionBox.textContent = levelRiddles[currentQuestionIndex].question;
            
            document.getElementById('answerInput').value = '';
            document.getElementById('resultMessage').style.display = 'none';
            document.getElementById('answerReveal').style.display = 'none';
            document.getElementById('answerInput').focus();
            
            const showButton = document.querySelector('.btn-show');
            if (hintCount > 0) {
                showButton.disabled = false;
                showButton.style.opacity = '1';
            } else {
                showButton.disabled = true;
                showButton.style.opacity = '0.5';
            }
        }

        function updateDisplay() {
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('totalQuestions').textContent = currentLevel * 10;
            document.getElementById('currentLevel').textContent = `${currentLevel}/${totalLevels}`;
            document.getElementById('levelBadge').textContent = `第 ${currentLevel} 关`;
            
            const progress = ((currentQuestionIndex + 1) / (currentLevel * 10)) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            
            const hintCounter = document.getElementById('hintCounter');
            if (hintCount > 0) {
                hintCounter.textContent = `💡 显示答案机会：${hintCount} 次`;
                hintCounter.classList.remove('hint-warning');
            } else {
                hintCounter.textContent = '⚠️ 显示答案机会已用完！';
                hintCounter.classList.add('hint-warning');
            }
        }

        function checkAnswer() {
            const userAnswer = document.getElementById('answerInput').value.trim();
            const correctAnswer = levelRiddles[currentQuestionIndex].answer;
            const resultMessage = document.getElementById('resultMessage');
            
            if (!userAnswer) {
                resultMessage.textContent = '请输入答案！';
                resultMessage.className = 'result-message result-wrong';
                resultMessage.style.display = 'block';
                return;
            }

            if (userAnswer === correctAnswer) {
                correctCount++;
                resultMessage.innerHTML = '🎉 答对了！太棒了！';
                resultMessage.className = 'result-message result-correct';
                resultMessage.style.display = 'block';
                
                document.getElementById('questionBox').classList.add('celebrate');
                setTimeout(() => {
                    document.getElementById('questionBox').classList.remove('celebrate');
                }, 500);
            } else {
                resultMessage.innerHTML = '❌ 答错了，再想想吧！';
                resultMessage.className = 'result-message result-wrong';
                resultMessage.style.display = 'block';
            }
            
            updateDisplay();
        }

        function showAnswer() {
            if (hintCount <= 0) {
                alert('显示答案机会已用完！你需要重新开始本关卡。');
                showLevelFailed();
                return;
            }
            
            hintCount--;
            updateDisplay();
            
            const answerReveal = document.getElementById('answerReveal');
            const correctAnswer = levelRiddles[currentQuestionIndex].answer;
            answerReveal.innerHTML = `<strong>正确答案是：</strong>${correctAnswer}`;
            answerReveal.style.display = 'block';
            
            if (hintCount === 0) {
                document.querySelector('.btn-show').disabled = true;
                document.querySelector('.btn-show').style.opacity = '0.5';
            }
        }

        function nextQuestion() {
            const questionsInLevel = currentLevel * 10;
            
            if (currentQuestionIndex < questionsInLevel - 1) {
                currentQuestionIndex++;
                updateDisplay();
                showQuestion();
            } else {
                showLevelComplete();
            }
        }

        function showLevelComplete() {
            const questionsInLevel = currentLevel * 10;
            const percentage = Math.round((correctCount / questionsInLevel) * 100);
            const requiredPercentage = 60;
            
            let stars = '';
            if (percentage >= 90) stars = '⭐⭐⭐';
            else if (percentage >= 70) stars = '⭐⭐';
            else if (percentage >= requiredPercentage) stars = '⭐';
            else stars = '😢';
            
            let message = '';
            if (percentage >= requiredPercentage) {
                message = `恭喜你完成了第 ${currentLevel} 关！`;
                if (currentLevel < totalLevels) {
                    message += `<br>准备好进入第 ${currentLevel + 1} 关了吗？`;
                }
            } else {
                message = `很遗憾，你需要答对 ${requiredPercentage}% 才能进入下一关。`;
                message += `<br>再试一次吧！`;
            }
            
            const questionBox = document.getElementById('questionBox');
            questionBox.innerHTML = `
                <div class="level-complete">
                    <h2>🎊 第 ${currentLevel} 关完成！🎊</h2>
                    <div class="stars">${stars}</div>
                    <p>答对 ${correctCount}/${questionsInLevel} 题 (${percentage}%)</p>
                    <p>${message}</p>
                </div>
            `;
            
            document.getElementById('answerInput').style.display = 'none';
            document.querySelector('.btn-submit').style.display = 'none';
            document.querySelector('.btn-show').style.display = 'none';
            document.getElementById('resultMessage').style.display = 'none';
            document.getElementById('answerReveal').style.display = 'none';
            
            const nextButton = document.querySelector('.btn-next');
            if (percentage >= requiredPercentage && currentLevel < totalLevels) {
                nextButton.textContent = '进入下一关';
                nextButton.onclick = nextLevel;
            } else if (percentage >= requiredPercentage && currentLevel >= totalLevels) {
                nextButton.textContent = '查看最终成绩';
                nextButton.onclick = showFinalResult;
            } else {
                nextButton.textContent = '重新挑战本关';
                nextButton.onclick = retryLevel;
            }
        }

        function nextLevel() {
            levelRiddles.forEach(riddle => {
                if (!usedRiddles.includes(riddle)) {
                    usedRiddles.push(riddle);
                }
            });
            
            currentLevel++;
            
            document.getElementById('answerInput').style.display = 'block';
            document.querySelector('.btn-submit').style.display = 'inline-block';
            document.querySelector('.btn-show').style.display = 'inline-block';
            document.querySelector('.btn-next').textContent = '下一题';
            document.querySelector('.btn-next').onclick = nextQuestion;
            
            startLevel();
        }

        function showLevelFailed() {
            const questionBox = document.getElementById('questionBox');
            questionBox.innerHTML = `
                <div class="level-complete">
                    <h2>😢 本关挑战失败</h2>
                    <p>显示答案机会已用完！</p>
                    <p>你需要重新开始本关卡。</p>
                </div>
            `;
            
            document.getElementById('answerInput').style.display = 'none';
            document.querySelector('.btn-submit').style.display = 'none';
            document.querySelector('.btn-show').style.display = 'none';
            document.getElementById('resultMessage').style.display = 'none';
            document.getElementById('answerReveal').style.display = 'none';
            
            const nextButton = document.querySelector('.btn-next');
            nextButton.textContent = '重新开始本关';
            nextButton.onclick = retryLevel;
        }

        function retryLevel() {
            document.getElementById('answerInput').style.display = 'block';
            document.querySelector('.btn-submit').style.display = 'inline-block';
            document.querySelector('.btn-show').style.display = 'inline-block';
            document.querySelector('.btn-next').textContent = '下一题';
            document.querySelector('.btn-next').onclick = nextQuestion;
            
            startLevel();
        }

        function showFinalResult() {
            const questionBox = document.getElementById('questionBox');
            const totalQuestions = totalLevels * 10 + (totalLevels - 1) * totalLevels * 5;
            const totalCorrect = usedRiddles.length;
            const percentage = Math.round((totalCorrect / totalQuestions) * 100);
            
            let message = '';
            let emoji = '';
            
            if (percentage >= 90) {
                message = '完美！你是脑筋急转弯大师！🏆';
                emoji = '👑';
            } else if (percentage >= 70) {
                message = '太棒了！你的思维很敏捷！🌟';
                emoji = '🎯';
            } else if (percentage >= 50) {
                message = '不错！继续加油！💪';
                emoji = '👍';
            } else {
                message = '还可以，多练习会更好！📚';
                emoji = '🤔';
            }
            
            questionBox.innerHTML = `
                <div class="level-complete">
                    <h2>🎊 恭喜通关！🎊</h2>
                    <div class="emoji">${emoji}</div>
                    <p>${message}</p>
                    <p>你完成了所有 ${totalLevels} 个关卡！</p>
                    <p>总共答对 ${totalCorrect} 道题目</p>
                </div>
            `;
            
            document.getElementById('answerInput').style.display = 'none';
            document.querySelector('.btn-submit').style.display = 'none';
            document.querySelector('.btn-show').style.display = 'none';
            document.querySelector('.btn-next').textContent = '重新开始';
            document.querySelector('.btn-next').onclick = restartGame;
            document.getElementById('resultMessage').style.display = 'none';
            document.getElementById('answerReveal').style.display = 'none';
        }

        function restartGame() {
            document.getElementById('answerInput').style.display = 'block';
            document.querySelector('.btn-submit').style.display = 'inline-block';
            document.querySelector('.btn-show').style.display = 'inline-block';
            document.querySelector('.btn-next').textContent = '下一题';
            document.querySelector('.btn-next').onclick = nextQuestion;
            initGame();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                checkAnswer();
            }
        }

        window.onload = function() {
    document.getElementById('categorySelection').classList.add('active');
    document.getElementById('gameArea').classList.remove('active');
};
    </script>
</body>
